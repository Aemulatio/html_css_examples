<html lang="ru">
<head>

  <title>CSS Nesting</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .nest-card {
      background: #fff;
      border: 1px solid #d8e5f4;
      border-radius: 12px;
      padding: 1rem;

      & h2 {
        margin-top: 0;
      }

      & a {
        color: #0f766e;
        text-decoration-thickness: 2px;

        &:hover {
          text-decoration-color: #ef4444;
        }
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>CSS Nesting</h1>
    <div class="demo nest-card">
      <h2>Вложенные правила</h2>
      <p>Стили записаны внутри родителя, без препроцессора.</p>
