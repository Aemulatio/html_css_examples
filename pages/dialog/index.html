<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dialog</title>
  <link rel="stylesheet" href="../../styles.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <h1>HTML &lt;dialog&gt;</h1>
    <div class="demo">
      <button id="open">Открыть диалог</button>
      <dialog id="modal">
        <p>Это нативный модальный диалог.</p>
        <button id="close">Закрыть</button>
      </dialog>
    </div>
    <a href="../../docs/dialog.md">Документация: dialog</a>
    <br>
    <a class="back" href="../../index.html">← Назад</a>
  </main>

  <script>
    const modal = document.getElementById('modal');
    document.getElementById('open').addEventListener('click', () => modal.showModal());
    document.getElementById('close').addEventListener('click', () => modal.close());
  </script>
</body>
</html>
