<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subgrid</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .parent {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .parent > article {
      background: #fff;
      border: 1px solid #d9e4f2;
      border-radius: 12px;
      padding: 10px;
      display: grid;
      grid-template-rows: subgrid;
      grid-row: span 3;
    }

    .parent > article > * {
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>CSS Subgrid</h1>
    <div class="demo parent">
      <article>
        <h3>Карточка 1</h3>
        <p>Короткий текст.</p>
        <button>Кнопка</button>
      </article>
      <article>
        <h3>Карточка 2</h3>
        <p>Текст длиннее, но строки все равно синхронизированы subgrid.</p>
        <button>Кнопка</button>
      </article>
      <article>
        <h3>Карточка 3</h3>
        <p>Средний текст.</p>
        <button>Кнопка</button>
      </article>
    </div>
    <a href="../docs/subgrid.md">Документация: subgrid</a>
    <br>
    <a class="back" href="../index.html">← Назад</a>
  </main>
</body>
</html>
