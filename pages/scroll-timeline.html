<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-driven animation</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .track {
      height: 220px;
      overflow: auto;
      border: 1px solid #c8d8ed;
      border-radius: 12px;
      padding: 10px;
      scroll-timeline-name: --panel;
      scroll-timeline-axis: block;
    }

    .progress {
      height: 8px;
      width: 100%;
      transform-origin: left;
      background: #0f766e;
      animation: fill linear both;
      animation-timeline: --panel;
    }

    .space {
      height: 620px;
      background: linear-gradient(#ffffff, #e9f4ff);
      border-radius: 8px;
    }

    @keyframes fill {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>CSS Scroll-driven Animations</h1>
    <div class="demo track">
      <div class="progress"></div>
      <div class="space"></div>
    </div>
    <a class="back" href="../index.html">← Назад</a>
  </main>
</body>
</html>
